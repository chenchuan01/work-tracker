version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: work-tracker-backend
    ports:
      - "9090:3001"
    volumes:
      # 使用命名卷代替主机挂载，避免 WSL2 文件系统问题
      - work-tracker-data:/data
    environment:
      - NODE_ENV=production
      - PORT=3001

      - DATA_DIR=/data
      - TZ=Asia/Shanghai
    restart: unless-stopped
    networks:
      - work-tracker-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:9090/api
    container_name: work-tracker-frontend
    ports:
      - "9000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - work-tracker-network

networks:
  work-tracker-network:
    driver: bridge

volumes:
  work-tracker-data:
    driver: local
